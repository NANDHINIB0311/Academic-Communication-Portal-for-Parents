<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Parentlyx</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="login-container">
    <h2>Parentlyx - Admin Login</h2>
    <form onsubmit="login(event)">
        <input type="text" id="adminID" placeholder="Admin ID" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p id="loginMsg"></p>
</div>

<!-- ================= DASHBOARD WRAPPER ================= -->
<div id="dashboardPage" class="hidden">

<header class="header">
    <h1>Parentlyx – Admin Portal</h1>
    <button onclick="logout()">Logout</button>
</header>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <ul>
            <li onclick="showSection('dashboard')">Dashboard</li>
            <li onclick="showSection('teacher')">Add Teacher</li>
            <li onclick="showSection('parent')">Add Parent</li>
            <li onclick="showSection('student')">Add Student</li>
            <li onclick="showSection('announcement')">Announcements</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="content">

        <!-- ================= DASHBOARD ================= -->
        <section id="dashboard" class="section active">
            <h2>Dashboard</h2>

            <div class="cards">
                <div class="card clickable" onclick="showStudentList()">
                    <h4>Students</h4>
                    <span id="studentsCount">0</span>
                </div>

                <div class="card clickable" onclick="showTeacherList()">
                    <h4>Teachers</h4>
                    <span id="teachersCount">0</span>
                </div>

                <div class="card clickable" onclick="showParentList()">
                    <h4>Parents</h4>
                    <span id="parentsCount">0</span>
                </div>
            </div>
        </section>

        <!-- ================= STUDENT LIST ================= -->
        <section id="studentListSection" class="section">
            <h2>Students</h2>
            <div id="studentListContainer" class="list-container"></div>
            <button onclick="showSection('dashboard')">Back to Dashboard</button>
        </section>

        <!-- ================= TEACHER LIST ================= -->
        <section id="teacherListSection" class="section">
            <h2>Teachers</h2>
            <div id="teacherListContainer" class="list-container"></div>
            <button onclick="showSection('dashboard')">Back to Dashboard</button>
        </section>

        <!-- ================= PARENT LIST ================= -->
        <section id="parentListSection" class="section">
            <h2>Parents</h2>
            <div id="parentListContainer" class="list-container"></div>
            <button onclick="showSection('dashboard')">Back to Dashboard</button>
        </section>

        <!-- ================= ADD TEACHER ================= -->
        <section id="teacher" class="section">
            <h2>Add Teacher</h2>
            <form onsubmit="addTeacher(event)">
                <input type="text" placeholder="Teacher Name" id="teacherName" required>
                <input type="text" placeholder="Subject" id="teacherSubject" required>
                <input type="email" placeholder="Email" id="teacherEmail" required>
                <input type="text" placeholder="Mobile" id="teacherMobile" required>
                <button type="submit">Add Teacher</button>
            </form>
        </section>

        <!-- ================= ADD PARENT ================= -->
        <section id="parent" class="section">
            <h2>Add Parent</h2>
            <form onsubmit="addParent(event)">
                <input type="text" placeholder="Parent Name" id="parentName" required>
                <input type="text" placeholder="Mobile Number" id="parentMobile" required>
                <select id="parentLanguage">
                    <option>English</option>
                    <option>Tamil</option>
                </select>
                <button type="submit">Add Parent</button>
            </form>
        </section>

        <!-- ================= ADD STUDENT ================= -->
        <section id="student" class="section">
            <h2>Add Student</h2>
            <form onsubmit="addStudent(event)">
                <input type="text" placeholder="Student Name" id="studentName" required>
                <input type="text" placeholder="Register Number" id="studentReg" required>
                <input type="text" placeholder="Class / Year" id="studentClass" required>
                <button type="submit">Add Student</button>
            </form>
        </section>

        <!-- ================= ANNOUNCEMENT ================= -->
        <section id="announcement" class="section">
            <h2>Send Announcement</h2>
            <textarea placeholder="Enter message"></textarea>
            <button onclick="sendAnnouncement()">Send</button>
        </section>

        <!-- ================= DETAILS MODAL ================= -->
        <section id="detailsModal" class="section">
            <h2>Details</h2>
            <div id="detailsContainer" class="list-container"></div>
            <button onclick="closeDetails()">Close</button>
        </section>

    </main>
</div>
</div>

<script src="admin.js"></script>
</body>
</html>
